<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" fill="none">
  <!-- Speech bubble with music note character -->
  <g transform="translate(30, 30)">
    <!-- Bubble body (rounded squircle) -->
    <path d="M 20 0
             L 80 0
             Q 100 0 100 20
             L 100 70
             Q 100 90 80 90
             L 40 90
             L 20 108
             L 22 90
             Q 0 90 0 70
             L 0 20
             Q 0 0 20 0 Z"
          fill="#F5583E"/>

    <!-- Music note body -->
    <g transform="translate(40, 22)">
      <circle cx="6" cy="40" r="10" fill="#FFF"/>
      <rect x="14" y="0" width="4" height="40" rx="2" fill="#FFF"/>
      <path d="M 14 0 Q 34 4 34 22 Q 22 10 14 14 Z" fill="#FFF"/>
    </g>

    <!-- Smile face on note body (subtle eyes + smile) -->
    <g transform="translate(40, 58)">
      <circle cx="1" cy="0" r="1.5" fill="#F5583E"/>
      <circle cx="11" cy="0" r="1.5" fill="#F5583E"/>
      <path d="M 1 5 Q 6 9 11 5" stroke="#F5583E" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(170, 68)">
    <text x="0" y="0" font-family="'Pretendard','A2G','Noto Sans KR',sans-serif" font-size="52" font-weight="900" fill="#2C2C2C" letter-spacing="-2">하이싱</text>
    <text x="2" y="28" font-family="'Pretendard','Noto Sans KR',sans-serif" font-size="14" font-weight="600" fill="#6B7280" letter-spacing="0.5">목소리로 만드는 노래 선물</text>

    <!-- Mini heart dot over 이 -->
    <path d="M 66 -52 C 64 -56, 58 -56, 58 -51 C 58 -47, 65 -42, 65 -42 C 65 -42, 72 -47, 72 -51 C 72 -56, 68 -56, 66 -52 Z"
          fill="#F5583E" opacity="0.85"/>
  </g>
</svg>
