<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="skyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9F6"/>
      <stop offset="100%" stop-color="#FFE8E2"/>
    </linearGradient>
    <radialGradient id="warmLight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFE8A0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFE8A0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#skyBg)"/>
  <ellipse cx="600" cy="400" rx="700" ry="300" fill="url(#warmLight)"/>

  <!-- Ground/platform -->
  <ellipse cx="600" cy="640" rx="550" ry="30" fill="#F5583E" opacity="0.1"/>

  <!-- Floating music notes background -->
  <g opacity="0.5">
    <g transform="translate(100, 120)" fill="#FDBDB5">
      <circle cx="0" cy="10" r="6"/>
      <rect x="4" y="-10" width="2.5" height="20" rx="1.25"/>
    </g>
    <g transform="translate(1080, 160) rotate(15)" fill="#FA8C7D">
      <circle cx="0" cy="10" r="8"/>
      <rect x="6" y="-14" width="3" height="24" rx="1.5"/>
      <path d="M 6 -14 Q 20 -12 20 -4 Q 12 -10 6 -8 Z"/>
    </g>
    <g transform="translate(220, 380) rotate(-10)" fill="#FDBDB5">
      <circle cx="0" cy="10" r="5"/>
      <rect x="4" y="-8" width="2" height="18" rx="1"/>
    </g>
    <g transform="translate(960, 440) rotate(20)" fill="#FA8C7D">
      <circle cx="0" cy="10" r="7"/>
      <rect x="5" y="-12" width="2.5" height="22" rx="1.25"/>
    </g>
  </g>

  <!-- === FAMILY SILHOUETTE SCENE === -->
  <!-- Center: speakers/gift vinyl disc -->
  <g transform="translate(600, 470)">
    <!-- Vinyl record -->
    <circle cx="0" cy="0" r="90" fill="#2C2C2C"/>
    <circle cx="0" cy="0" r="90" stroke="#444" stroke-width="0.5" fill="none"/>
    <circle cx="0" cy="0" r="72" stroke="#555" stroke-width="0.5" fill="none"/>
    <circle cx="0" cy="0" r="54" stroke="#555" stroke-width="0.5" fill="none"/>
    <circle cx="0" cy="0" r="38" fill="#F5583E"/>
    <circle cx="0" cy="0" r="38" stroke="#C9371E" stroke-width="1" fill="none"/>
    <text x="0" y="-4" text-anchor="middle" fill="#FFF" font-family="'Pretendard','A2G',sans-serif" font-size="10" font-weight="800">하이싱</text>
    <text x="0" y="10" text-anchor="middle" fill="#FFF" font-family="'Pretendard','A2G',sans-serif" font-size="7" opacity="0.8">FAMILY SONG</text>
    <circle cx="0" cy="0" r="5" fill="#2C2C2C"/>
    <!-- Sound waves from disc -->
    <g fill="none" stroke="#F5583E" stroke-opacity="0.4" stroke-width="2">
      <path d="M -130 -20 Q -140 0 -130 20"/>
      <path d="M -150 -40 Q -164 0 -150 40"/>
      <path d="M 130 -20 Q 140 0 130 20"/>
      <path d="M 150 -40 Q 164 0 150 40"/>
    </g>
  </g>

  <!-- === Left: Father figure (silhouette with warm fill) === -->
  <g transform="translate(360, 310)">
    <!-- Shadow -->
    <ellipse cx="0" cy="240" rx="60" ry="6" fill="#C9371E" opacity="0.15"/>
    <!-- Body -->
    <path d="M -35 60 Q -40 140 -30 230 L 30 230 Q 40 140 35 60 Z" fill="#F5583E"/>
    <!-- Head -->
    <circle cx="0" cy="30" r="38" fill="#FDBDB5"/>
    <!-- Hair -->
    <path d="M -32 14 Q -20 -4 0 -6 Q 20 -4 32 14 Q 28 2 0 0 Q -28 2 -32 14 Z" fill="#6B7280"/>
    <!-- Glasses -->
    <circle cx="-12" cy="30" r="7" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>
    <circle cx="12" cy="30" r="7" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>
    <line x1="-5" y1="30" x2="5" y2="30" stroke="#2C2C2C" stroke-width="1.5"/>
    <!-- Smile -->
    <path d="M -8 46 Q 0 52 8 46" stroke="#2C2C2C" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Shirt collar -->
    <path d="M -18 70 L 0 88 L 18 70 L 10 66 L 0 70 L -10 66 Z" fill="#FFF" opacity="0.9"/>
    <!-- Heart emoji above head -->
    <g transform="translate(-50, -20)" opacity="0.85">
      <path d="M 10 8 C 10 4, 6 0, 2 2 C -2 0, -6 4, -6 8 C -6 14, 2 20, 2 20 C 2 20, 10 14, 10 8 Z" fill="#F5583E"/>
    </g>
  </g>

  <!-- === Right: Mother figure === -->
  <g transform="translate(840, 310)">
    <!-- Shadow -->
    <ellipse cx="0" cy="240" rx="60" ry="6" fill="#C9371E" opacity="0.15"/>
    <!-- Body (skirt) -->
    <path d="M -40 60 Q -45 140 -50 230 L 50 230 Q 45 140 40 60 Z" fill="#FA8C7D"/>
    <!-- Head -->
    <circle cx="0" cy="30" r="38" fill="#FDBDB5"/>
    <!-- Hair (bun) -->
    <path d="M -32 20 Q -32 -8 0 -10 Q 32 -8 32 20 Q 32 10 0 10 Q -32 10 -32 20 Z" fill="#C9371E"/>
    <circle cx="0" cy="-12" r="10" fill="#C9371E"/>
    <!-- Smile -->
    <path d="M -8 46 Q 0 52 8 46" stroke="#2C2C2C" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Eyes -->
    <path d="M -12 30 Q -10 28 -8 30" stroke="#2C2C2C" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M 8 30 Q 10 28 12 30" stroke="#2C2C2C" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Cheek blush -->
    <circle cx="-18" cy="40" r="4" fill="#F5583E" opacity="0.35"/>
    <circle cx="18" cy="40" r="4" fill="#F5583E" opacity="0.35"/>
    <!-- Carnation on chest -->
    <g transform="translate(0, 90)">
      <circle cx="0" cy="0" r="10" fill="#C9371E"/>
      <circle cx="-5" cy="-3" r="4" fill="#F5583E"/>
      <circle cx="5" cy="-3" r="4" fill="#F5583E"/>
      <circle cx="-5" cy="3" r="4" fill="#F5583E"/>
      <circle cx="5" cy="3" r="4" fill="#F5583E"/>
    </g>
    <!-- Musical note above -->
    <g transform="translate(44, -16) rotate(15)" opacity="0.85">
      <circle cx="0" cy="8" r="5" fill="#F5583E"/>
      <rect x="4" y="-8" width="2" height="16" rx="1" fill="#F5583E"/>
      <path d="M 4 -8 Q 12 -6 12 0 Q 8 -4 4 -4 Z" fill="#F5583E"/>
    </g>
  </g>

  <!-- === TEXT OVERLAY === -->
  <g transform="translate(600, 110)" text-anchor="middle">
    <text x="0" y="0" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="14" font-weight="800" letter-spacing="4">WHY HI-SING</text>
    <text x="0" y="50" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="38" font-weight="900" letter-spacing="-1.5">말로 못 전한 마음,</text>
    <text x="0" y="96" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="38" font-weight="900" letter-spacing="-1.5">노래는 대신 전해줍니다</text>
    <text x="0" y="140" fill="#6B7280" font-family="'Pretendard','A2G',sans-serif" font-size="15" font-weight="400">가족 목소리 하나로 부모님께 평생 기억될 순간을.</text>
  </g>

  <!-- Bottom stat -->
  <g transform="translate(600, 660)" text-anchor="middle">
    <text x="0" y="0" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="14" font-weight="700">
      <tspan font-weight="900" font-size="18">94%</tspan> 의 수령자가 눈물을 흘렸습니다
    </text>
  </g>
</svg>
