<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9F6"/>
      <stop offset="60%" stop-color="#FFEDE6"/>
      <stop offset="100%" stop-color="#FEDBD6"/>
    </linearGradient>
    <linearGradient id="carnation1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FA8C7D"/>
      <stop offset="50%" stop-color="#F5583E"/>
      <stop offset="100%" stop-color="#C9371E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5583E" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#F5583E" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg1)"/>

  <!-- Decorative background elements -->
  <circle cx="900" cy="440" r="340" fill="url(#glow1)"/>
  <circle cx="150" cy="700" r="100" fill="#FDBDB5" opacity="0.35"/>
  <circle cx="1080" cy="100" r="60" fill="#FDBDB5" opacity="0.4"/>

  <!-- Diagonal wave line -->
  <path d="M -50 780 Q 300 720 600 760 T 1250 720" stroke="#FDBDB5" stroke-width="2" stroke-opacity="0.4" fill="none" stroke-dasharray="6 8"/>

  <!-- === LEFT: TEXT BLOCK === -->
  <g transform="translate(80, 110)">
    <!-- Date badge -->
    <g>
      <rect x="0" y="0" width="204" height="48" rx="24" fill="#F5583E"/>
      <circle cx="22" cy="24" r="5" fill="#FFF"/>
      <circle cx="22" cy="24" r="2.5" fill="#F5583E"/>
      <text x="40" y="31" fill="#FFF" font-family="'Pretendard','A2G',sans-serif" font-size="15" font-weight="800" letter-spacing="0.5">5월 8일 어버이날 특가</text>
    </g>

    <!-- Subcopy -->
    <text x="0" y="98" fill="#6B7280" font-family="'Pretendard','A2G',sans-serif" font-size="18" font-weight="500">말로 다 못한 마음을, 이제 노래로</text>

    <!-- Main headline -->
    <text x="0" y="168" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="62" font-weight="900" letter-spacing="-2">
      올해만큼은
    </text>
    <text x="0" y="240" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="62" font-weight="900" letter-spacing="-2">
      <tspan fill="#F5583E">건강하세요</tspan> 대신
    </text>
    <text x="0" y="312" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="62" font-weight="900" letter-spacing="-2">
      노래 한 곡
    </text>

    <!-- Description -->
    <text x="0" y="368" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="18" font-weight="400">
      부모님의 목소리로 만드는, 세상에 단 하나뿐인 노래.
    </text>
    <text x="0" y="394" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="18" font-weight="400">
      이번 어버이날, 한 번쯤은 진심을 담아보세요.
    </text>

    <!-- Price anchor -->
    <g transform="translate(0, 440)">
      <!-- Strikethrough original -->
      <text x="0" y="20" fill="#AAAAAA" font-family="'Pretendard','A2G',sans-serif" font-size="18" font-weight="500" text-decoration="line-through">29,000원</text>
      <!-- Discount badge -->
      <g transform="translate(110, 0)">
        <rect x="0" y="4" width="70" height="24" rx="12" fill="#F5583E"/>
        <text x="35" y="21" text-anchor="middle" fill="#FFF" font-family="'Pretendard','A2G',sans-serif" font-size="13" font-weight="800">31% ↓</text>
      </g>
      <!-- Special price -->
      <text x="0" y="78" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="52" font-weight="900" letter-spacing="-1">
        19,900원
      </text>
      <text x="200" y="78" fill="#AAAAAA" font-family="'Pretendard','A2G',sans-serif" font-size="16" font-weight="500">얼리버드 특가</text>
    </g>

    <!-- CTA button + secondary -->
    <g transform="translate(0, 560)">
      <rect x="0" y="0" width="260" height="64" rx="32" fill="#F5583E"/>
      <text x="110" y="40" text-anchor="middle" fill="#FFF" font-family="'Pretendard','A2G',sans-serif" font-size="18" font-weight="800">지금 노래 선물하기</text>
      <path d="M 218 32 L 228 32 M 223 27 L 228 32 L 223 37" stroke="#FFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <g transform="translate(290, 20)">
        <path d="M 12 0 L 12 24" stroke="#E0E0E0" stroke-width="1"/>
      </g>

      <g transform="translate(320, 18)">
        <circle cx="14" cy="14" r="14" fill="#FFF" stroke="#E0E0E0" stroke-width="1.5"/>
        <path d="M 11 9 L 19 14 L 11 19 Z" fill="#F5583E"/>
        <text x="40" y="18" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="14" font-weight="700">샘플 듣기</text>
      </g>
    </g>

    <!-- Trust indicators -->
    <g transform="translate(0, 670)">
      <g>
        <circle cx="9" cy="9" r="9" fill="#FEDBD6"/>
        <path d="M 5 9 L 8 12 L 13 6" stroke="#F5583E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="26" y="14" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="13" font-weight="600">2주 안 완성</text>
      </g>
      <g transform="translate(140, 0)">
        <circle cx="9" cy="9" r="9" fill="#FEDBD6"/>
        <path d="M 5 9 L 8 12 L 13 6" stroke="#F5583E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="26" y="14" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="13" font-weight="600">가사/앨범 포함</text>
      </g>
      <g transform="translate(300, 0)">
        <circle cx="9" cy="9" r="9" fill="#FEDBD6"/>
        <path d="M 5 9 L 8 12 L 13 6" stroke="#F5583E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="26" y="14" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="13" font-weight="600">100% 환불 보장</text>
      </g>
    </g>
  </g>

  <!-- === RIGHT: CARNATION + WAVE COMPOSITION === -->
  <g transform="translate(720, 180)">

    <!-- Outer ripple rings -->
    <circle cx="220" cy="220" r="260" stroke="#F5583E" stroke-width="1.5" stroke-opacity="0.15" stroke-dasharray="2 8"/>
    <circle cx="220" cy="220" r="210" stroke="#F5583E" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="2 8"/>
    <circle cx="220" cy="220" r="160" stroke="#F5583E" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="2 8"/>

    <!-- Radial waveform bars -->
    <g transform="translate(220, 220)">
      <g fill="#F5583E">
        <g transform="rotate(0)"><rect x="-3" y="95" width="6" height="20" rx="3"/></g>
        <g transform="rotate(20)"><rect x="-3" y="95" width="6" height="32" rx="3"/></g>
        <g transform="rotate(40)"><rect x="-3" y="95" width="6" height="14" rx="3"/></g>
        <g transform="rotate(60)"><rect x="-3" y="95" width="6" height="26" rx="3"/></g>
        <g transform="rotate(80)"><rect x="-3" y="95" width="6" height="38" rx="3"/></g>
        <g transform="rotate(100)"><rect x="-3" y="95" width="6" height="18" rx="3"/></g>
        <g transform="rotate(120)"><rect x="-3" y="95" width="6" height="28" rx="3"/></g>
        <g transform="rotate(140)"><rect x="-3" y="95" width="6" height="16" rx="3"/></g>
        <g transform="rotate(160)"><rect x="-3" y="95" width="6" height="34" rx="3"/></g>
        <g transform="rotate(180)"><rect x="-3" y="95" width="6" height="22" rx="3"/></g>
        <g transform="rotate(200)"><rect x="-3" y="95" width="6" height="14" rx="3"/></g>
        <g transform="rotate(220)"><rect x="-3" y="95" width="6" height="30" rx="3"/></g>
        <g transform="rotate(240)"><rect x="-3" y="95" width="6" height="40" rx="3"/></g>
        <g transform="rotate(260)"><rect x="-3" y="95" width="6" height="20" rx="3"/></g>
        <g transform="rotate(280)"><rect x="-3" y="95" width="6" height="26" rx="3"/></g>
        <g transform="rotate(300)"><rect x="-3" y="95" width="6" height="16" rx="3"/></g>
        <g transform="rotate(320)"><rect x="-3" y="95" width="6" height="34" rx="3"/></g>
        <g transform="rotate(340)"><rect x="-3" y="95" width="6" height="22" rx="3"/></g>
      </g>
    </g>

    <!-- Carnation (centerpiece) -->
    <g transform="translate(220, 220)">
      <!-- Stem -->
      <path d="M 0 40 Q -3 80 2 140 Q 0 180 3 220" stroke="#2D7A3E" stroke-width="5" stroke-linecap="round" fill="none"/>
      <!-- Leaves -->
      <path d="M 2 90 Q -30 80 -46 100 Q -32 110 -2 100 Z" fill="#3AA556"/>
      <path d="M 2 90 Q -30 80 -46 100 Q -32 110 -2 100 Z" fill="#2D7A3E" opacity="0.3"/>
      <path d="M 3 130 Q 32 120 48 138 Q 33 148 4 140 Z" fill="#3AA556"/>

      <!-- Flower petals (multiple layers for ruffled carnation) -->
      <g>
        <!-- Outer petals -->
        <circle cx="0" cy="0" r="56" fill="url(#carnation1)"/>
        <!-- Petal bumps around edge -->
        <g fill="#FA8C7D">
          <circle cx="-42" cy="-32" r="18"/>
          <circle cx="42" cy="-32" r="18"/>
          <circle cx="-52" cy="0" r="18"/>
          <circle cx="52" cy="0" r="18"/>
          <circle cx="-42" cy="32" r="18"/>
          <circle cx="42" cy="32" r="18"/>
          <circle cx="0" cy="-44" r="18"/>
          <circle cx="0" cy="44" r="18"/>
        </g>
        <!-- Mid layer -->
        <circle cx="0" cy="0" r="40" fill="#F5583E"/>
        <!-- Inner ruffles -->
        <g fill="#E54428">
          <ellipse cx="-14" cy="-14" rx="16" ry="20" transform="rotate(-25 -14 -14)"/>
          <ellipse cx="14" cy="-14" rx="16" ry="20" transform="rotate(25 14 -14)"/>
          <ellipse cx="-14" cy="14" rx="16" ry="20" transform="rotate(25 -14 14)"/>
          <ellipse cx="14" cy="14" rx="16" ry="20" transform="rotate(-25 14 14)"/>
        </g>
        <!-- Center -->
        <circle cx="0" cy="0" r="20" fill="#C9371E"/>
        <circle cx="-3" cy="-3" r="9" fill="#F5583E" fill-opacity="0.8"/>
        <!-- Musical note inside -->
        <g fill="#FFF" transform="translate(-7, -10)">
          <circle cx="2" cy="16" r="5"/>
          <rect x="5.5" y="-2" width="2" height="18" rx="1"/>
          <path d="M 5.5 -2 Q 15 0 15 8 Q 10 3 5.5 6 Z"/>
        </g>
      </g>
    </g>

    <!-- Floating ornaments -->
    <g opacity="0.9">
      <g transform="translate(40, 60)" fill="#F5583E">
        <circle cx="0" cy="10" r="5"/>
        <rect x="4" y="-8" width="2" height="18" rx="1"/>
        <path d="M 4 -8 Q 14 -6 14 2 Q 9 -2 4 -2 Z"/>
      </g>
      <g transform="translate(380, 50) rotate(15)" fill="#FDBDB5">
        <circle cx="0" cy="10" r="6"/>
        <rect x="4" y="-10" width="2.5" height="20" rx="1.25"/>
      </g>
      <g transform="translate(30, 380) rotate(-12)" fill="#FA8C7D">
        <circle cx="0" cy="10" r="5"/>
        <rect x="4" y="-8" width="2" height="18" rx="1"/>
        <path d="M 4 -8 Q 14 -6 14 2 Q 9 -2 4 -2 Z"/>
      </g>
      <g transform="translate(400, 400)" fill="#F5583E">
        <path d="M 12 2 L 14 10 L 22 12 L 14 14 L 12 22 L 10 14 L 2 12 L 10 10 Z" opacity="0.7"/>
      </g>
    </g>
  </g>

  <!-- Logo top-right -->
  <g transform="translate(1050, 60)">
    <g fill="#F5583E">
      <rect x="0" y="2" width="2.5" height="6" rx="1.25"/>
      <rect x="4" y="-4" width="3" height="18" rx="1.5"/>
      <rect x="9.5" y="-4" width="3" height="18" rx="1.5"/>
      <path d="M 20 -4 Q 21 4 25 5 Q 21 6 20 14 Q 19 6 15 5 Q 19 4 20 -4 Z"/>
      <rect x="28" y="-4" width="3" height="18" rx="1.5"/>
      <rect x="33.5" y="-4" width="3" height="18" rx="1.5"/>
      <rect x="38" y="2" width="2.5" height="6" rx="1.25"/>
    </g>
    <text x="50" y="10" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="18" font-weight="800">하이싱</text>
  </g>
</svg>
