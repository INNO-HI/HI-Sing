<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" fill="none">
  <defs>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FA8C7D"/>
      <stop offset="100%" stop-color="#F5583E"/>
    </linearGradient>
  </defs>

  <!-- === ICON: 가족이 감싸안은 하트 === -->
  <g transform="translate(30, 25)">
    <!-- Background heart shape (hug) -->
    <path d="M 65 125
             C 30 95, 0 70, 0 42
             C 0 18, 20 0, 40 5
             C 52 8, 60 18, 65 28
             C 70 18, 78 8, 90 5
             C 110 0, 130 18, 130 42
             C 130 70, 100 95, 65 125 Z"
          fill="url(#heart)"/>

    <!-- Family figures inside heart (silhouette) -->
    <!-- Dad (tall, left) -->
    <g transform="translate(38, 42)">
      <circle cx="0" cy="0" r="11" fill="#FFFFFF"/>
      <path d="M -14 30 Q -16 45 -10 50 L 10 50 Q 16 45 14 30 Q 10 15 0 14 Q -10 15 -14 30 Z" fill="#FFFFFF"/>
    </g>

    <!-- Mom (medium, right) -->
    <g transform="translate(90, 42)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF"/>
      <!-- Hair bun -->
      <circle cx="0" cy="-11" r="4" fill="#FFFFFF"/>
      <path d="M -13 30 Q -16 45 -10 50 L 10 50 Q 16 45 13 30 Q 10 15 0 14 Q -10 15 -13 30 Z" fill="#FFFFFF"/>
    </g>

    <!-- Child (small, center front) -->
    <g transform="translate(64, 54)">
      <circle cx="0" cy="0" r="8" fill="#FFFFFF"/>
      <path d="M -10 20 Q -12 32 -7 36 L 7 36 Q 12 32 10 20 Q 7 10 0 9 Q -7 10 -10 20 Z" fill="#FFFFFF"/>
    </g>

    <!-- Small music note floating above heart -->
    <g transform="translate(100, -8)" fill="#F5583E">
      <circle cx="2" cy="14" r="4.5"/>
      <rect x="5.5" y="-2" width="2" height="16" rx="1"/>
      <path d="M 5.5 -2 Q 14 0 14 7 Q 10 3 5.5 5 Z"/>
    </g>
    <g transform="translate(18, 0)" fill="#FDBDB5">
      <circle cx="0" cy="10" r="3.5"/>
      <rect x="3" y="-3" width="1.5" height="13" rx="0.75"/>
    </g>
  </g>

  <!-- === WORDMARK === -->
  <g transform="translate(200, 80)">
    <text x="0" y="0" font-family="'Pretendard','A2G','Noto Sans KR',sans-serif" font-size="56" font-weight="900" fill="#2C2C2C" letter-spacing="-2.5">하이싱</text>
    <text x="2" y="32" font-family="'Pretendard','Noto Sans KR',sans-serif" font-size="15" font-weight="600" fill="#6B7280" letter-spacing="0.5">가족의 목소리로 만드는 노래 선물</text>
  </g>
</svg>
