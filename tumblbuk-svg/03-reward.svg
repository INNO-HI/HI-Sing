<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#FFF9F6"/>

  <!-- Section header -->
  <text x="600" y="90" text-anchor="middle" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="14" font-weight="800" letter-spacing="4">EARLY BIRD REWARDS</text>
  <text x="600" y="140" text-anchor="middle" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="40" font-weight="900" letter-spacing="-1.5">어버이날 한정, 특가 리워드</text>
  <text x="600" y="174" text-anchor="middle" fill="#6B7280" font-family="'Pretendard','A2G',sans-serif" font-size="16" font-weight="400">텀블벅에서만 만날 수 있는 가격</text>

  <!-- === LEFT: Basic Reward === -->
  <g transform="translate(140, 240)">
    <rect x="0" y="0" width="290" height="460" rx="24" fill="#FFF" stroke="#EEEEEE" stroke-width="1.5"/>

    <!-- Icon header -->
    <g transform="translate(145, 50)">
      <circle cx="0" cy="0" r="32" fill="#F5F5F5"/>
      <!-- Note icon -->
      <g fill="#6B7280" transform="translate(-10, -14)">
        <circle cx="3" cy="20" r="5"/>
        <rect x="6.5" y="-2" width="2.5" height="22" rx="1.25"/>
        <path d="M 6.5 -2 Q 18 0 18 10 Q 12 4 6.5 6 Z"/>
      </g>
    </g>

    <text x="145" y="130" text-anchor="middle" fill="#6B7280" font-family="'Pretendard','A2G',sans-serif" font-size="13" font-weight="700" letter-spacing="1">BASIC</text>
    <text x="145" y="170" text-anchor="middle" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="24" font-weight="900">노래 제작</text>

    <!-- Price -->
    <g transform="translate(145, 210)">
      <text x="0" y="0" text-anchor="middle" fill="#AAAAAA" font-family="'Pretendard','A2G',sans-serif" font-size="14" text-decoration="line-through">29,000원</text>
      <text x="0" y="48" text-anchor="middle" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="36" font-weight="900">19,900원</text>
    </g>

    <line x1="30" y1="300" x2="260" y2="300" stroke="#EEEEEE" stroke-width="1"/>

    <!-- Features -->
    <g transform="translate(30, 330)" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="13">
      <g><circle cx="6" cy="-4" r="6" fill="#FEDBD6"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#F5583E" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">맞춤 노래 1곡 (3~4분)</text></g>
      <g transform="translate(0, 26)"><circle cx="6" cy="-4" r="6" fill="#FEDBD6"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#F5583E" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">MP3 파일 제공</text></g>
      <g transform="translate(0, 52)"><circle cx="6" cy="-4" r="6" fill="#FEDBD6"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#F5583E" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">가사 텍스트 포함</text></g>
      <g transform="translate(0, 78)"><circle cx="6" cy="-4" r="6" fill="#FEDBD6"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#F5583E" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">카카오톡 선물 링크</text></g>
    </g>
  </g>

  <!-- === CENTER: Best Reward (highlighted) === -->
  <g transform="translate(455, 210)">
    <!-- Recommended badge -->
    <g transform="translate(145, 0)">
      <rect x="-60" y="0" width="120" height="32" rx="16" fill="#F5583E"/>
      <text x="0" y="21" text-anchor="middle" fill="#FFF" font-family="'Pretendard','A2G',sans-serif" font-size="13" font-weight="800">🎁 가장 인기</text>
    </g>

    <rect x="0" y="30" width="290" height="480" rx="24" fill="#FFF" stroke="#F5583E" stroke-width="2.5" filter="drop-shadow(0 20px 40px rgba(245,88,62,0.15))"/>

    <!-- Icon header -->
    <g transform="translate(145, 90)">
      <circle cx="0" cy="0" r="36" fill="#FEDBD6"/>
      <g fill="#F5583E" transform="translate(-14, -18)">
        <circle cx="3" cy="22" r="6"/>
        <rect x="7" y="-2" width="3" height="24" rx="1.5"/>
        <path d="M 7 -2 Q 20 0 20 10 Q 14 4 7 6 Z"/>
        <!-- heart -->
        <path d="M 30 26 C 30 22, 26 18, 22 20 C 18 18, 14 22, 14 26 C 14 32, 22 38, 22 38 C 22 38, 30 32, 30 26 Z" fill="#C9371E"/>
      </g>
    </g>

    <text x="145" y="180" text-anchor="middle" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="13" font-weight="800" letter-spacing="1">PREMIUM</text>
    <text x="145" y="220" text-anchor="middle" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="24" font-weight="900">풀 패키지</text>

    <g transform="translate(145, 260)">
      <text x="0" y="0" text-anchor="middle" fill="#AAAAAA" font-family="'Pretendard','A2G',sans-serif" font-size="14" text-decoration="line-through">49,000원</text>
      <text x="0" y="48" text-anchor="middle" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="40" font-weight="900">34,900원</text>
    </g>

    <line x1="30" y1="348" x2="260" y2="348" stroke="#FEDBD6" stroke-width="1"/>

    <g transform="translate(30, 380)" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="13" font-weight="600">
      <g><circle cx="6" cy="-4" r="6" fill="#F5583E"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#FFF" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">BASIC 모든 혜택 포함</text></g>
      <g transform="translate(0, 26)"><circle cx="6" cy="-4" r="6" fill="#F5583E"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#FFF" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">가사 카드 이미지 (고해상도)</text></g>
      <g transform="translate(0, 52)"><circle cx="6" cy="-4" r="6" fill="#F5583E"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#FFF" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">AI 앨범 커버 이미지</text></g>
      <g transform="translate(0, 78)"><circle cx="6" cy="-4" r="6" fill="#F5583E"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#FFF" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">인쇄용 원본 파일 제공</text></g>
    </g>
  </g>

  <!-- === RIGHT: Limited Reward === -->
  <g transform="translate(770, 240)">
    <rect x="0" y="0" width="290" height="460" rx="24" fill="#FFF" stroke="#EEEEEE" stroke-width="1.5"/>

    <g transform="translate(145, 50)">
      <circle cx="0" cy="0" r="32" fill="#FEDBD6"/>
      <g transform="translate(-16, -16)" fill="#F5583E">
        <path d="M 16 0 L 18 10 L 28 12 L 18 14 L 16 24 L 14 14 L 4 12 L 14 10 Z"/>
        <path d="M 4 20 L 5 25 L 10 26 L 5 27 L 4 32 L 3 27 L -2 26 L 3 25 Z"/>
      </g>
    </g>

    <text x="145" y="130" text-anchor="middle" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="13" font-weight="800" letter-spacing="1">LIMITED 30</text>
    <text x="145" y="170" text-anchor="middle" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="24" font-weight="900">VIP 스페셜</text>

    <g transform="translate(145, 210)">
      <text x="0" y="0" text-anchor="middle" fill="#AAAAAA" font-family="'Pretendard','A2G',sans-serif" font-size="14" text-decoration="line-through">79,000원</text>
      <text x="0" y="48" text-anchor="middle" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="36" font-weight="900">54,900원</text>
    </g>

    <line x1="30" y1="300" x2="260" y2="300" stroke="#EEEEEE" stroke-width="1"/>

    <g transform="translate(30, 330)" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="13">
      <g><circle cx="6" cy="-4" r="6" fill="#FEDBD6"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#F5583E" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">PREMIUM 모든 혜택 포함</text></g>
      <g transform="translate(0, 26)"><circle cx="6" cy="-4" r="6" fill="#FEDBD6"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#F5583E" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">가사 액자 (인쇄·배송 포함)</text></g>
      <g transform="translate(0, 52)"><circle cx="6" cy="-4" r="6" fill="#FEDBD6"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#F5583E" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">우선 제작 (5~7일 완성)</text></g>
      <g transform="translate(0, 78)"><circle cx="6" cy="-4" r="6" fill="#FEDBD6"/><path d="M 3 -4 L 5 -2 L 9 -6" stroke="#F5583E" stroke-width="1.8" stroke-linecap="round" fill="none"/><text x="20" y="0">리터치 1회 무료</text></g>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="600" y="760" text-anchor="middle" fill="#AAAAAA" font-family="'Pretendard','A2G',sans-serif" font-size="13">* 모든 리워드는 어버이날 이전 배송 보장 (4/24까지 주문 시)</text>
</svg>
