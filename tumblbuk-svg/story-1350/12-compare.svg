<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <rect width="1080" height="1350" fill="#FFFFFF"/>

  <text x="540" y="110" font-family="Pretendard, sans-serif" font-size="22" font-weight="800" fill="#F5583E" text-anchor="middle" letter-spacing="8">VALUE · 가격 대비 가치</text>

  <text x="540" y="220" font-family="Pretendard, sans-serif" font-size="52" font-weight="900" fill="#2C2C2C" text-anchor="middle">솔직히, 이 가격에</text>
  <text x="540" y="300" font-family="Pretendard, sans-serif" font-size="60" font-weight="900" fill="#F5583E" text-anchor="middle">이런 선물이 말이 되나요?</text>

  <!-- Table header -->
  <rect x="60" y="380" width="960" height="60" rx="12" fill="#2C2C2C"/>
  <text x="180" y="420" font-family="Pretendard, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">선물</text>
  <text x="540" y="420" font-family="Pretendard, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">평균 가격</text>
  <text x="870" y="420" font-family="Pretendard, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">지속 기간</text>

  <!-- Row 1 -->
  <rect x="60" y="450" width="960" height="90" rx="12" fill="#FAFAFA"/>
  <text x="180" y="480" font-family="Pretendard, sans-serif" font-size="30" text-anchor="middle">🌷</text>
  <text x="180" y="515" font-family="Pretendard, sans-serif" font-size="20" font-weight="700" fill="#2C2C2C" text-anchor="middle">카네이션 꽃다발</text>
  <text x="540" y="500" font-family="Pretendard, sans-serif" font-size="28" font-weight="900" fill="#2C2C2C" text-anchor="middle">25,000원</text>
  <text x="870" y="500" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#DC2626" text-anchor="middle">약 7일</text>

  <!-- Row 2 -->
  <rect x="60" y="550" width="960" height="90" rx="12" fill="#FAFAFA"/>
  <text x="180" y="580" font-family="Pretendard, sans-serif" font-size="30" text-anchor="middle">🍱</text>
  <text x="180" y="615" font-family="Pretendard, sans-serif" font-size="20" font-weight="700" fill="#2C2C2C" text-anchor="middle">외식 한 끼</text>
  <text x="540" y="600" font-family="Pretendard, sans-serif" font-size="28" font-weight="900" fill="#2C2C2C" text-anchor="middle">80,000원</text>
  <text x="870" y="600" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#DC2626" text-anchor="middle">약 3시간</text>

  <!-- Row 3 -->
  <rect x="60" y="650" width="960" height="90" rx="12" fill="#FAFAFA"/>
  <text x="180" y="680" font-family="Pretendard, sans-serif" font-size="30" text-anchor="middle">💰</text>
  <text x="180" y="715" font-family="Pretendard, sans-serif" font-size="20" font-weight="700" fill="#2C2C2C" text-anchor="middle">용돈 봉투</text>
  <text x="540" y="700" font-family="Pretendard, sans-serif" font-size="28" font-weight="900" fill="#2C2C2C" text-anchor="middle">100,000원+</text>
  <text x="870" y="700" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#DC2626" text-anchor="middle">약 1개월</text>

  <!-- Row 4 -->
  <rect x="60" y="750" width="960" height="90" rx="12" fill="#FAFAFA"/>
  <text x="180" y="780" font-family="Pretendard, sans-serif" font-size="30" text-anchor="middle">🎁</text>
  <text x="180" y="815" font-family="Pretendard, sans-serif" font-size="20" font-weight="700" fill="#2C2C2C" text-anchor="middle">건강식품 세트</text>
  <text x="540" y="800" font-family="Pretendard, sans-serif" font-size="28" font-weight="900" fill="#2C2C2C" text-anchor="middle">50,000원</text>
  <text x="870" y="800" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#DC2626" text-anchor="middle">약 2개월</text>

  <!-- Hi-Sing row (highlighted) -->
  <rect x="60" y="870" width="960" height="140" rx="16" fill="#F5583E"/>
  <text x="180" y="920" font-family="Pretendard, sans-serif" font-size="40" text-anchor="middle">🎵</text>
  <text x="180" y="965" font-family="Pretendard, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF" text-anchor="middle">하이싱 노래</text>
  <text x="180" y="990" font-family="Pretendard, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" fill-opacity="0.9" text-anchor="middle">★ 본 상품</text>
  <text x="540" y="950" font-family="Pretendard, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">19,900원~</text>
  <text x="540" y="985" font-family="Pretendard, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" fill-opacity="0.9" text-anchor="middle">가장 저렴</text>
  <text x="870" y="950" font-family="Pretendard, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">평생</text>
  <text x="870" y="985" font-family="Pretendard, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" fill-opacity="0.9" text-anchor="middle">가장 오래</text>

  <!-- Conclusion -->
  <rect x="60" y="1060" width="960" height="180" rx="24" fill="#2C2C2C"/>
  <text x="540" y="1115" font-family="Pretendard, sans-serif" font-size="28" font-weight="700" fill="#E5E7EB" text-anchor="middle">가장 싸고 가장 오래 남는 선물을,</text>
  <text x="540" y="1165" font-family="Pretendard, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">안 드릴 이유가 있을까요?</text>
  <text x="540" y="1210" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#F5583E" text-anchor="middle">커피 5잔 값 · 평생 가는 기억</text>

  <text x="540" y="1320" font-family="Pretendard, sans-serif" font-size="20" font-weight="700" fill="#9CA3AF" text-anchor="middle">12 / 15</text>
</svg>
