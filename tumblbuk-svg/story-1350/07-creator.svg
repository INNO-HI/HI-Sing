  <text x="100" y="420" font-family="Pretendard, sans-serif" font-size="22" font-weight="500" fill="#4B5563">• AI 음성·생성형 음악 기술 연구팀</text>
  <text x="100" y="460" font-family="Pretendard, sans-serif" font-size="22" font-weight="500" fill="#4B5563">• Google Lyria API 공식 파트너</text>
  <text x="100" y="500" font-family="Pretendard, sans-serif" font-size="22" font-weight="500" fill="#4B5563">• 보건복지부 AI 돌봄 실증사업 선정 (2024)</text>
  <text x="100" y="540" font-family="Pretendard, sans-serif" font-size="22" font-weight="500" fill="#4B5563">• 지금까지 357곡 · 평균 만족도 4.9/5</text>
  <text x="100" y="580" font-family="Pretendard, sans-serif" font-size="20" font-weight="800" fill="#F5583E">contact@innohi.ai.kr</text>

