  <text x="100" y="710" font-family="Pretendard, sans-serif" font-size="22" font-weight="800" fill="#F5583E">📖  시작의 순간</text>
  <text x="100" y="770" font-family="Pretendard, sans-serif" font-size="26" font-weight="600" fill="#2C2C2C">2024년 설 명절, 팀원 한 명이 처음으로</text>
  <text x="100" y="810" font-family="Pretendard, sans-serif" font-size="26" font-weight="600" fill="#2C2C2C">어머니께 &#8216;본인 목소리 노래&#8217;를 드렸습니다.</text>

  <text x="100" y="880" font-family="Pretendard, sans-serif" font-size="28" font-weight="900" fill="#2C2C2C">&#8220;후렴이 나오자, 엄마가 숟가락을</text>
  <text x="100" y="920" font-family="Pretendard, sans-serif" font-size="28" font-weight="900" fill="#F5583E">놓고 오래 앉아 계셨어요.&#8221;</text>

  <text x="100" y="990" font-family="Pretendard, sans-serif" font-size="24" font-weight="600" fill="#4B5563">&#8220;30년 동안 말 못 했던 게 다 녹아나오더라고요.&#8221;</text>

  <text x="100" y="1055" font-family="Pretendard, sans-serif" font-size="24" font-weight="800" fill="#2C2C2C">&#8594;  그래서 대중에게도 열어 드립니다.</text>
  <text x="100" y="1090" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#F5583E">올해 어버이날, 모두 자녀의 첫 노래를 드릴 수 있도록.</text>

