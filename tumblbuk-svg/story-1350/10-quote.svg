<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <rect width="1080" height="1350" fill="#1A1A1A"/>
  <circle cx="900" cy="200" r="280" fill="#F5583E" fill-opacity="0.18"/>
  <circle cx="160" cy="1180" r="220" fill="#F5583E" fill-opacity="0.13"/>

  <text x="540" y="110" font-family="Pretendard, sans-serif" font-size="22" font-weight="800" fill="#F5583E" text-anchor="middle" letter-spacing="8">VOICES · 받은 분들의 반응</text>

  <!-- Huge quote -->
  <text x="540" y="360" font-family="Pretendard, sans-serif" font-size="260" font-weight="900" fill="#F5583E" fill-opacity="0.35" text-anchor="middle">&#8220;</text>

  <text x="540" y="540" font-family="Pretendard, sans-serif" font-size="66" font-weight="900" fill="#FFFFFF" text-anchor="middle">아빠 눈물,</text>
  <text x="540" y="630" font-family="Pretendard, sans-serif" font-size="66" font-weight="900" fill="#FFFFFF" text-anchor="middle">태어나서</text>
  <text x="540" y="730" font-family="Pretendard, sans-serif" font-size="80" font-weight="900" fill="#F5583E" text-anchor="middle">처음 봤어요.</text>

  <text x="540" y="810" font-family="Pretendard, sans-serif" font-size="22" font-weight="600" fill="#9CA3AF" text-anchor="middle">— 30대 딸, 아버지 생신 선물 / 부산 ㅇㅇ님</text>

  <line x1="440" y1="880" x2="640" y2="880" stroke="#F5583E" stroke-width="3"/>

  <!-- Mini quotes -->
  <g transform="translate(80, 950)">
    <text x="0" y="30" font-family="Pretendard, sans-serif" font-size="24" font-style="italic" font-weight="700" fill="#E5E7EB">&#8220;엄마가 노래 틀어달라고 하시는 거, 처음이에요&#8221;</text>
    <text x="0" y="60" font-family="Pretendard, sans-serif" font-size="18" font-weight="500" fill="#9CA3AF">— 결혼 35주년 기념 · 대구 김OO</text>
  </g>
  <g transform="translate(80, 1060)">
    <text x="0" y="30" font-family="Pretendard, sans-serif" font-size="24" font-style="italic" font-weight="700" fill="#E5E7EB">&#8220;플래카드 거실에 걸어놓고 보신대요&#8221;</text>
    <text x="0" y="60" font-family="Pretendard, sans-serif" font-size="18" font-weight="500" fill="#9CA3AF">— 칠순 잔치 · 인천 박OO</text>
  </g>
  <g transform="translate(80, 1170)">
    <text x="0" y="30" font-family="Pretendard, sans-serif" font-size="24" font-style="italic" font-weight="700" fill="#E5E7EB">&#8220;매년 어버이날, 이 노래만 틀어 드릴 거예요&#8221;</text>
    <text x="0" y="60" font-family="Pretendard, sans-serif" font-size="18" font-weight="500" fill="#9CA3AF">— 2024 어버이날 수령자 · 경기 최OO</text>
  </g>

  <text x="540" y="1320" font-family="Pretendard, sans-serif" font-size="20" font-weight="700" fill="#6B7280" text-anchor="middle">10 / 15</text>
</svg>
