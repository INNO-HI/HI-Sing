<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1722" width="1240" height="1722">
<defs><linearGradient id="bg_5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#2C2C2C"/></linearGradient></defs>
<rect width="1240" height="1722" fill="url(#bg_5)"/>

<g transform="translate(0, 0)">
  <text x="620" y="140" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="22" font-weight="800" letter-spacing="6" text-anchor="middle">REAL STORY</text>
  <text x="620" y="220" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="50" font-weight="900" letter-spacing="-2" text-anchor="middle">어느 팔순 저녁의 이야기</text>

  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="1080" height="1050" rx="32" fill="#FFF" stroke="#EEE" stroke-width="2"/>
    <g transform="translate(40, 40)">
      <rect x="0" y="0" width="1000" height="220" rx="20" fill="#FFF1ED"/>
      <g transform="translate(150, 110)">
        <circle cx="0" cy="0" r="72" fill="#FDBDB5"/>
        <text x="0" y="22" text-anchor="middle" font-size="72">🎂</text>
      </g>
      <text x="270" y="110" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="36" font-weight="900">어머니 팔순</text>
      <text x="270" y="158" fill="#6B7280" font-family="'Pretendard','A2G',sans-serif" font-size="20">40대 아들이 어머니께 드린 노래</text>
      <g transform="translate(760, 80)">
        <rect x="0" y="0" width="200" height="56" rx="28" fill="#F5583E"/>
        <text x="100" y="36" text-anchor="middle" fill="#FFF" font-family="'Pretendard','A2G',sans-serif" font-size="20" font-weight="800">듣기 ▶</text>
      </g>
    </g>

    <g transform="translate(60, 310)">
      <text x="0" y="0" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="18" font-weight="800" letter-spacing="3">배경</text>
      <text x="0" y="40" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="22" font-weight="500">새벽 다섯 시, 어머니는 30년을 같은 시간에</text>
      <text x="0" y="72" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="22" font-weight="500">일어나 도시락을 싸셨습니다.</text>
    </g>

    <g transform="translate(60, 450)">
      <rect x="0" y="0" width="960" height="160" rx="20" fill="#FFF1ED" stroke="#FDBDB5" stroke-width="2"/>
      <text x="30" y="40" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="18" font-weight="800" letter-spacing="3">가사 한 구절</text>
      <text x="30" y="90" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="24" font-weight="600" font-style="italic">“새벽 다섯 시, 작은 불빛 하나</text>
      <text x="30" y="124" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="24" font-weight="600" font-style="italic">엄마의 손끝에서 하루가 시작됐지”</text>
    </g>

    <g transform="translate(60, 670)">
      <text x="0" y="0" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="18" font-weight="800" letter-spacing="3">받은 날</text>
      <text x="0" y="40" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="24" font-weight="700">“후렴이 나오자 어머니가 숟가락을 놓으셨어요.</text>
      <text x="0" y="76" fill="#2C2C2C" font-family="'Pretendard','A2G',sans-serif" font-size="24" font-weight="700">온 가족이 다 울었습니다.”</text>
    </g>

    <g transform="translate(60, 830)">
      <text x="0" y="0" fill="#F5583E" font-family="'Pretendard','A2G',sans-serif" font-size="18" font-weight="800" letter-spacing="3">그 후</text>
      <text x="0" y="40" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="22" font-weight="500">어머니는 매일 아침 설거지하실 때</text>
      <text x="0" y="72" fill="#444444" font-family="'Pretendard','A2G',sans-serif" font-size="22" font-weight="500">이 노래를 틀어두신다고 합니다.</text>
    </g>
  </g>
</g>

<!-- bottom fade hint into next dark card -->
<text x="620" y="1540" text-anchor="middle" fill="#FFF" opacity="0.5" font-family="'Pretendard','A2G',sans-serif" font-size="18" letter-spacing="4">수령자들의 진짜 목소리 →</text>

</svg>