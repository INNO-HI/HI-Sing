      <path d="M -9 -8 Q 0 -14 9 -8 Q 7 -11 0 -10 Q -7 -11 -9 -8 Z" fill="#FEDBD6"/>
      <path d="M 10 18 Q 20 12 26 20" stroke="#FFF" stroke-width="5" stroke-linecap="round" fill="none"/>
