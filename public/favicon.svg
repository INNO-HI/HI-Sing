<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#FF6E59">
  <!-- 컨셉 08: 편지 봉투 + 음표 — 편지 대신 노래 -->
  <!-- envelope body -->
  <rect x="30" y="80" width="140" height="95" rx="6"/>
  <!-- envelope flap (open, folded down) -->
  <path d="M30 80 L100 130 L170 80 Z" fill="#FFF2EF"/>
  <path d="M30 80 L100 130 L170 80" fill="none" stroke="#FF6E59" stroke-width="5" stroke-linejoin="round"/>
  <!-- music note flying out top -->
  <circle cx="100" cy="48" r="11"/>
  <rect x="109" y="10" width="5" height="42"/>
  <path d="M114 10 L138 3 L138 16 L114 23 Z"/>
</svg>
