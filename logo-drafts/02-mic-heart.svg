<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#FF6E59">
  <!-- 컨셉 02: 마이크 + 하트 — 마이크 그릴 안에 하트 -->
  <!-- mic body -->
  <rect x="70" y="30" width="60" height="100" rx="30"/>
  <!-- stand -->
  <path d="M100 140 L100 170" stroke="#FF6E59" stroke-width="8" stroke-linecap="round"/>
  <rect x="65" y="170" width="70" height="8" rx="4"/>
  <!-- stand arc -->
  <path d="M45 100 Q45 140 100 140 Q155 140 155 100" fill="none" stroke="#FF6E59" stroke-width="8" stroke-linecap="round"/>
  <!-- heart inside mic grille -->
  <path d="M100 100 C88 90, 82 82, 82 72 C82 64, 88 58, 95 58 C98 58, 100 60, 100 60 C100 60, 102 58, 105 58 C112 58, 118 64, 118 72 C118 82, 112 90, 100 100 Z" fill="#FFF2EF"/>
</svg>
