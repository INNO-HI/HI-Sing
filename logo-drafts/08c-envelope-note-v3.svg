<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#FF6E59">
  <!-- 편지봉투 + 음표 v3: 작은 사이즈에서도 식별 가능한 비율 -->

  <!-- 봉투 본체 (하단 2/3 차지, 크게) -->
  <rect x="18" y="82" width="164" height="108" rx="10"/>

  <!-- 플랩 V (흰색 삼각, 깊게 들어감) -->
  <path d="M18 82 L100 150 L182 82 Z" fill="#FFF2EF"/>

  <!-- 플랩 윤곽선 (두껍게) -->
  <path d="M18 82 L100 150 L182 82" fill="none" stroke="#FF6E59" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 봉투 좌우 접선 (살짝만 — 입체감) -->
  <path d="M18 82 L62 130" stroke="#FF6E59" stroke-width="2" opacity="0.35" fill="none"/>
  <path d="M182 82 L138 130" stroke="#FF6E59" stroke-width="2" opacity="0.35" fill="none"/>

  <!-- 큰 음표 (봉투 상단 중앙에서 우측으로 날아오름) -->
  <!-- 음표 머리 (크게, r=18) -->
  <ellipse cx="112" cy="56" rx="20" ry="16" transform="rotate(-18 112 56)"/>
  <!-- stem (두껍게) -->
  <rect x="127" y="10" width="9" height="48" rx="2" transform="rotate(-6 131.5 34)"/>
  <!-- flag (크게) -->
  <path d="M131 8
           Q160 16, 162 36
           Q148 28, 138 42
           Q142 24, 131 22 Z"/>
</svg>
